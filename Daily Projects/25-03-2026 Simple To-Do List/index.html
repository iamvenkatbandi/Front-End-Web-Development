<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple To-Do List App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="container">
        <div id="card1">
        <input type="text" id="input" placeholder="Enter the Task Here...">

        <button type="button" id="btn">Add Task</button>

        <div id="devnotecontainer">
        <p id="devnote">Designed by <span id="name">Bandi Venkat Chowdary</span>.</p>
        </div>

        </div>

        <div id="card2">
            <h2 id="heading">To-Do List</h2>

            <ol type="1" id="list"></ol>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
